name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  repository_dispatch:
    types: [core-published]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read
      issues: write

    steps:
      - name: Checkout siimpli-graph-it-copy
        uses: actions/checkout@v4
        with:
          path: siimpli-graph-it-copy

      - name: Checkout siimpli-graph-it-core
        uses: actions/checkout@v4
        with:
          repository: harisonsharp/siimpli-graph-it-core
          ref: ${{ github.event.client_payload.core_version || '' }}
          path: siimpli-graph-it-core

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@harisonsharp'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './siimpli-graph-it-copy/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: siimpli-graph-it-copy
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dispatch path: build only to verify compatibility with the new core version.
      - name: Build (compatibility check)
        if: github.event_name == 'repository_dispatch'
        working-directory: siimpli-graph-it-copy
        run: npm run tauri build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tag / manual path: full build + GitHub Release.
      - name: Build and release
        if: github.event_name != 'repository_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./siimpli-graph-it-copy
          tagName: v__VERSION__
          releaseName: SiimpliGraphIt v__VERSION__
          releaseBody: |
            See the full changelog for details.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const isCascade = context.eventName === 'repository_dispatch';
            const trigger = isCascade
              ? `cascade compat check (core: ${context.payload.client_payload?.core_version})`
              : `release ${context.ref}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failed: ${trigger}`,
              body: `The build workflow failed for **${trigger}**.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['build-failure']
            });
